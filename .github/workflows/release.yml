name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: lazylog-x86_64-unknown-linux-gnu
            archive_file: lazylog-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            artifact: lazylog-x86_64-pc-windows-msvc
            archive_file: lazylog-x86_64-pc-windows-msvc.zip
          - os: macos-15-intel
            artifact: lazylog-x86_64-apple-darwin
            archive_file: lazylog-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            artifact: lazylog-aarch64-apple-darwin
            archive_file: lazylog-aarch64-apple-darwin.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Create archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/release
          tar czf ../../${{ matrix.archive_file }} lazylog

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/release
          Compress-Archive -Path lazylog.exe -DestinationPath ..\..\${{ matrix.archive_file }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive_file }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
